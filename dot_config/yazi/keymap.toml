[manager]
prepend_keymap = [
  { on = ["<Space>", "g"], run = "shell --block -- lazygit" },
]

keymap = [
  { on = "<Esc>", run = "escape",             desc = "Exit visual mode, clear selected, or cancel search" },
  { on = "q",     run = "quit",               desc = "Exit the process" },
  { on = "Q",     run = "quit --no-cwd-file", desc = "Exit the process without writing cwd-file" },
  { on = "<C-c>", run = "close",              desc = "Close the current tab, or quit if it is last tab" },

  # Navigation
  { on = "k", run = "arrow -1",        desc = "Move cursor up" },
  { on = "j", run = "arrow 1",         desc = "Move cursor down" },
  { on = "K", run = "arrow -5",        desc = "Move cursor up 5 lines" },
  { on = "J", run = "arrow 5",         desc = "Move cursor down 5 lines" },
  { on = "h", run = "leave",           desc = "Go back to the parent directory" },
  { on = "l", run = "enter",           desc = "Enter the child directory" },
  { on = "H", run = "back",            desc = "Go back to the previous directory" },
  { on = "L", run = "forward",         desc = "Go forward to the next directory" },
  { on = "<Up>",    run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>",  run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Left>",  run = "leave",    desc = "Go back to the parent directory" },
  { on = "<Right>", run = "enter",    desc = "Enter the child directory" },
  { on = "<C-u>", run = "arrow -50%", desc = "Move cursor up half page" },
  { on = "<C-d>", run = "arrow 50%",  desc = "Move cursor down half page" },
  { on = "<C-b>", run = "arrow -100%", desc = "Move cursor up one page" },
  { on = "<C-f>", run = "arrow 100%",  desc = "Move cursor down one page" },
  { on = "g", run = "arrow -99999999", desc = "Move cursor to the top" },
  { on = "G", run = "arrow 99999999",  desc = "Move cursor to the bottom" },

  # Selection
  { on = "v",       run = "visual_mode",                      desc = "Enter visual mode (selection mode)" },
  { on = "V",       run = "visual_mode --unset",              desc = "Enter visual mode (unset mode)" },
  { on = "<C-a>",   run = "select_all --state=true",          desc = "Select all files" },
  { on = "<C-r>",   run = "select_all --state=none",          desc = "Inverse selection of all files" },

  # Operation
  { on = "o",  run = "open",                        desc = "Open the selected files" },
  { on = "O",  run = "open --interactive",          desc = "Open the selected files interactively" },
  { on = "<Enter>", run = "open",                   desc = "Open the selected files" },
  { on = "y",  run = "yank",                        desc = "Copy the selected files" },
  { on = "x",  run = "yank --cut",                  desc = "Cut the selected files" },
  { on = "p",  run = "paste",                       desc = "Paste the files" },
  { on = "P",  run = "paste --force",               desc = "Paste the files (overwrite if the destination exists)" },
  { on = "d",  run = "remove",                      desc = "Move the files to the trash" },
  { on = "D",  run = "remove --permanently",        desc = "Permanently delete the files" },
  { on = "a",  run = "create",                      desc = "Create a file (ends with / for directories)" },
  { on = "r",  run = "rename --cursor=before_ext",  desc = "Rename a file" },
  { on = ".",  run = "hidden toggle",               desc = "Toggle the visibility of hidden files" },
  { on = "s",  run = "search --via=fd",             desc = "Search files by name via fd" },
  { on = "S",  run = "search --via=rg",             desc = "Search files by content via ripgrep" },
  { on = "<C-s>", run = "search --via=none",        desc = "Cancel the ongoing search" },
  { on = "z",  run = "plugin zoxide",               desc = "Jump to a directory via zoxide" },
  { on = "Z",  run = "plugin fzf",                  desc = "Jump to a directory, or reveal a file via fzf" },

  # Linemode
  { on = ["m", "s"], run = "linemode size",        desc = "Set linemode to size" },
  { on = ["m", "p"], run = "linemode permissions", desc = "Set linemode to permissions" },
  { on = ["m", "m"], run = "linemode mtime",       desc = "Set linemode to mtime" },
  { on = ["m", "n"], run = "linemode none",        desc = "Set linemode to none" },

  # Copy
  { on = ["c", "c"], run = "copy cell",     desc = "Copy the file name" },
  { on = ["c", "n"], run = "copy filename", desc = "Copy the filename without extension" },
  { on = ["c", "e"], run = "copy extension", desc = "Copy the extension" },
  { on = ["c", "p"], run = "copy path",     desc = "Copy the absolute path" },
  { on = ["c", "d"], run = "copy dirpath",  desc = "Copy the path of the parent directory" },

  # Filter
  { on = "f", run = "filter --smart", desc = "Filter the files" },

  # Find
  { on = "/", run = "find --smart",            desc = "Find next file" },
  { on = "?", run = "find --previous --smart", desc = "Find previous file" },
  { on = "n", run = "find_arrow",              desc = "Go to the next found file" },
  { on = "N", run = "find_arrow --previous",   desc = "Go to the previous found file" },

  # Sorting
  { on = [",", "m"], run = "sort mtime --dir-first",  desc = "Sort by mtime" },
  { on = [",", "M"], run = "sort mtime --reverse --dir-first", desc = "Sort by mtime (reverse)" },
  { on = [",", "s"], run = "sort size --dir-first",   desc = "Sort by size" },
  { on = [",", "S"], run = "sort size --reverse --dir-first", desc = "Sort by size (reverse)" },
  { on = [",", "n"], run = "sort natural --dir-first", desc = "Sort naturally" },
  { on = [",", "e"], run = "sort extension --dir-first", desc = "Sort by extension" },

  # Tabs
  { on = "t",     run = "tab_create --current", desc = "Create a new tab using the current path" },
  { on = "1",     run = "tab_switch 0",         desc = "Switch to the first tab" },
  { on = "2",     run = "tab_switch 1",         desc = "Switch to the second tab" },
  { on = "3",     run = "tab_switch 2",         desc = "Switch to the third tab" },
  { on = "4",     run = "tab_switch 3",         desc = "Switch to the fourth tab" },
  { on = "5",     run = "tab_switch 4",         desc = "Switch to the fifth tab" },
  { on = "<Tab>", run = "tab_switch 1 --relative",  desc = "Switch to the next tab" },
  { on = "<S-Tab>", run = "tab_switch -1 --relative", desc = "Switch to the previous tab" },
  { on = "[",     run = "tab_swap -1",           desc = "Swap current tab with previous tab" },
  { on = "]",     run = "tab_swap 1",            desc = "Swap current tab with next tab" },

  # Undo/Redo
  { on = "u",     run = "undo", desc = "Undo the last operation" },
  { on = "<C-r>", run = "redo", desc = "Redo the last operation" },

  # Shell
  { on = "!",  run = "shell --interactive --block", desc = "Run a shell command (blocking)" },
  { on = "|",  run = "shell --interactive",         desc = "Run a shell command (non-blocking)" },

  # Goto
  { on = ["g", "h"], run = "cd ~",            desc = "Go to the home directory" },
  { on = ["g", "d"], run = "cd ~/Downloads",  desc = "Go to the Downloads directory" },
  { on = ["g", "c"], run = "cd ~/.config",    desc = "Go to the config directory" },
  { on = ["g", "t"], run = "cd /tmp",         desc = "Go to the temporary directory" },
]

[tasks]
keymap = [
  { on = "<Esc>", run = "close", desc = "Close task manager" },
  { on = "<C-c>", run = "close", desc = "Close task manager" },
  { on = "k",     run = "arrow -1", desc = "Move cursor up" },
  { on = "j",     run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Up>",   run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Enter>", run = "inspect", desc = "Inspect the task" },
  { on = "x",       run = "cancel",  desc = "Cancel the task" },
]

[select]
keymap = [
  { on = "<Esc>",   run = "close",          desc = "Cancel selection" },
  { on = "<C-c>",   run = "close",          desc = "Cancel selection" },
  { on = "<Enter>", run = "close --submit", desc = "Submit the selection" },
  { on = "k",       run = "arrow -1",       desc = "Move cursor up" },
  { on = "j",       run = "arrow 1",        desc = "Move cursor down" },
  { on = "<Up>",    run = "arrow -1",       desc = "Move cursor up" },
  { on = "<Down>",  run = "arrow 1",        desc = "Move cursor down" },
]

[input]
keymap = [
  { on = "<C-c>",   run = "close",          desc = "Cancel input" },
  { on = "<Enter>", run = "close --submit", desc = "Submit the input" },
  { on = "<Esc>",   run = "escape",         desc = "Go back to normal mode, or cancel input" },

  # Mode
  { on = "i",  run = "insert",                              desc = "Enter insert mode" },
  { on = "I",  run = ["move -999", "insert"],               desc = "Move to the BOL, and enter insert mode" },
  { on = "a",  run = "insert --append",                     desc = "Enter append mode" },
  { on = "A",  run = ["move 999", "insert --append"],       desc = "Move to the EOL, and enter append mode" },

  # Navigation
  { on = "h",       run = "move -1",   desc = "Move back a character" },
  { on = "l",       run = "move 1",    desc = "Move forward a character" },
  { on = "<Left>",  run = "move -1",   desc = "Move back a character" },
  { on = "<Right>", run = "move 1",    desc = "Move forward a character" },
  { on = "<C-a>",   run = "move -999", desc = "Move to the BOL" },
  { on = "<C-e>",   run = "move 999",  desc = "Move to the EOL" },
  { on = "b",       run = "backward",  desc = "Move back a word" },
  { on = "w",       run = "forward",   desc = "Move forward a word" },

  # Deletion
  { on = "<Backspace>", run = "backspace",         desc = "Delete the character before the cursor" },
  { on = "<Delete>",    run = "backspace --under", desc = "Delete the character under the cursor" },
  { on = "<C-u>",       run = "kill --bol",        desc = "Kill backwards to the BOL" },
  { on = "<C-k>",       run = "kill --eol",        desc = "Kill forwards to the EOL" },
  { on = "<C-w>",       run = "kill --backward",   desc = "Kill backwards a word" },
  { on = "<C-d>",       run = "kill --forward",    desc = "Kill forwards a word" },

  # History
  { on = "<Up>",   run = "move --history -1", desc = "Go to the previous history" },
  { on = "<Down>", run = "move --history 1",  desc = "Go to the next history" },

  # Clipboard
  { on = "<C-v>", run = "paste", desc = "Paste the clipboard" },
]

[confirm]
keymap = [
  { on = "<Esc>",   run = "close",          desc = "Cancel the confirm" },
  { on = "<C-c>",   run = "close",          desc = "Cancel the confirm" },
  { on = "<Enter>", run = "close --submit", desc = "Submit the confirm" },
  { on = "n",       run = "close",          desc = "Cancel the confirm" },
  { on = "y",       run = "close --submit", desc = "Submit the confirm" },
  { on = "k",       run = "arrow -1",       desc = "Move cursor up" },
  { on = "j",       run = "arrow 1",        desc = "Move cursor down" },
  { on = "<Up>",    run = "arrow -1",       desc = "Move cursor up" },
  { on = "<Down>",  run = "arrow 1",        desc = "Move cursor down" },
]

[help]
keymap = [
  { on = "<Esc>", run = "escape", desc = "Clear the filter, or close help" },
  { on = "<C-c>", run = "close",  desc = "Close help" },
  { on = "k",     run = "arrow -1", desc = "Move cursor up" },
  { on = "j",     run = "arrow 1",  desc = "Move cursor down" },
  { on = "<Up>",   run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1",  desc = "Move cursor down" },
  { on = "/",     run = "filter",   desc = "Filter the help" },
]
