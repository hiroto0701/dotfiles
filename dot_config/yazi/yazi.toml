[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "none"
show_hidden = true
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]
title_format = "Yazi: {cwd}"

[preview]
tab_size = 2
max_width = 1920
max_height = 1920
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "nvim", for = "unix" },
]
edit-cursor = [
  { run = 'cursor "$@"', desc = "Cursor", for = "unix" },
]
edit-vscode = [
  { run = 'code "$@"', desc = "VSCode", for = "unix" },
]
open = [
  { run = 'open "$@"', desc = "Open", for = "macos" },
]
reveal = [
  { run = 'open -R "$1"', desc = "Reveal in Finder", for = "macos" },
]

[open]
rules = [
  { mime = "text/*", use = ["edit", "edit-cursor", "edit-vscode"] },
  { mime = "image/*", use = "open" },
  { mime = "video/*", use = "open" },
  { mime = "audio/*", use = "open" },
  { mime = "inode/x-empty", use = ["edit", "edit-cursor", "edit-vscode"] },
  { mime = "application/json", use = ["edit", "edit-cursor", "edit-vscode"] },
  { mime = "*", use = ["open", "edit", "edit-cursor", "edit-vscode"] },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
image_alloc = 536870912  # 512MB
image_bound = [0, 0]
suppress_preload = false

[log]
enabled = false
